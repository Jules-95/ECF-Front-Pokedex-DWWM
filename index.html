<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
  </head>

  <body>
    <h1>Test PokéAPI</h1>

    <div id="resultat">Chargement...</div>

    <script>
      fetch("https://pokeapi.co/api/v2/pokemon/pikachu")
        .then(function (response) {
          return response.json();
        })
        .then(function (data) {
          console.log(data);
          document.getElementById("resultat").innerHTML = `
        <p>Nom : ${data.name}</p>
        <p>ID : ${data.id}</p>
        <ul>
            <li>
        <img src="${data.sprites.front_default}" alt="pikachu">
        <img src="${data.sprites.back_default}" alt="pikachu">
            </li>
            <li>
        <img src="${data.sprites.front_shiny}" alt="pikachu shiny">
        <img src="${data.sprites.back_shiny}" alt="pikachu shiny">
            </li>
        <p>Types : ${data.types.map((t) => t.type.name).join(", ")}</p>
      `;
        })
        .catch(function (erreur) {
          document.getElementById("resultat").innerHTML = "Erreur de connexion";
          console.error(erreur);
        });
    </script>
  </body>
</html>
